# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  # lucide_icons: ^0.257.0
  lucide_icons_flutter: ^3.1.10

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  # signatures
  # image_gallery_saver: ^2.0.3

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  signature: ^6.3.0
  path_provider: ^2.1.1
  geolocator: ^10.1.0
  flutter_map: ^6.1.0
  latlong2: 0.9.1
  http: ^1.2.0
  permission_handler: ^11.1.0
  animated_splash_screen: ^1.3.0
  lottie: ^2.7.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8
  geocoding: ^2.1.1
  path_parsing: ^1.0.1
  vector_math: ^2.1.4
  crypto: ^3.0.3
  image_picker: ^1.0.4
  image: ^4.0.15
  firebase_storage: ^13.3.0
  firebase_database: ^12.3.0
  table_calendar: ^3.0.9
  flutter_pdfview: ^1.3.1
  intl: ^0.18.1
  marquee: ^2.3.0
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.7
  pdfx: ^2.9.2
  webview_flutter: ^4.13.1
  archive: ^3.6.1

  # youtube_player_flutter: ^8.1.1
  # open_file: ^3.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec


# The following section is specific to Flutter packages.
flutter:
  fonts:
    - family: Lato
      fonts:
        - asset: assets/google_fonts/Lato-Black.ttf
    
    - family: OpenSauce
      fonts:
        - asset: assets/google_fonts/open-sauce.one-light.ttf
          weight: 300
        - asset: assets/google_fonts/open-sauce.one-regular.ttf
          weight: 400
        - asset: assets/google_fonts/open-sauce.one-medium.ttf
          weight: 500
        - asset: assets/google_fonts/open-sauce.one-bold.ttf
          weight: 700
        - asset: assets/google_fonts/open-sauce.one-black.ttf
          weight: 900

  uses-material-design: true

  assets:
    - assets/marketing_tools/NEW_EDA_BESINS_R2.pdf
    - assets/marketing_tools/2023_Full_Detailer_03292023.pdf
    - assets/marketing_tools/16_36_GAME.pdf
    - assets/marketing_tools/2023_Full_Detailer.pdf
    - assets/marketing_tools/Detailer_1_Full_Detailer.pdf
    - assets/marketing_tools/Detailer_2_16_36.pdf
    - assets/marketing_tools/BH_ELECTRONIC_DETAILING_AID_INTERACTIVE_011822.pdf
    - assets/marketing_tools/Utrogestan.pdf
    - assets/marketing_tools/Interactive_16_36_Detailer.pdf
    - assets/google_fonts/
    - assets/images/
    - assets/icons/
    - assets/animations/splash_animation.json
    
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"